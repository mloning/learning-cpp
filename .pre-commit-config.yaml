repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=google, -i]
      - id: clang-tidy
        args:
          [
            "--config-file=.clang-tidy",
            "-p=./build",
            "--format-style=google",
            "-fix",
          ]
